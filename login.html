<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Área do Barbeiro</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="body-login">

    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="btn-voltar">← Voltar ao site</a>
            
            <h2>Área do Barbeiro</h2>
            <p>Acesse o painel de agendamentos</p>

            <form id="form-login">
                <div class="input-group">
                    <label for="usuario">Usuário ou E-mail</label>
                    <input type="text" id="usuario" placeholder="Seu usuário" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-principal btn-block">Entrar no Painel</button>
            </form>
            
            <p class="esqueceu-senha"><a href="#">Esqueceu a senha?</a></p>
        </div>
    </div>

</body>
</html>
