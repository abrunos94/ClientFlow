<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Área do Barbeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/home.css"> <link rel="stylesheet" href="css/login.css">
</head>
<body class="body-login">

    <div class="login-container">
        <div class="login-box">
            <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao site</a>

            <h2>Área do Barbeiro</h2>
            <p>Acesse o painel </p>

            <form id="form-login">
                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-principal btn-block">Entrar no Painel</button>
                
                <div id="mensagem-erro" class="error-message"></div>
            </form>

            <p class="esqueceu-senha"><a href="#">Esqueceu a senha?</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
